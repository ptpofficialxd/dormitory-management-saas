name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.1.38'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  install:
    name: Install & cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install deps (frozen lockfile)
        run: bun install --frozen-lockfile

  lint:
    name: Lint (Biome)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint

  bun-api-guard:
    name: Portability guard (no Bun.* in app code)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run check:bun-api

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Unit tests (Vitest on Bun)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      # Only @dorm/shared runs in CI — @dorm/db's RLS suite needs a real
      # Postgres instance (added in a follow-up CI iteration with a service
      # container). Each package's `test` already has `vitest --run`.
      - run: bun run shared:test

  # Parity check: ensures app code still runs under Node (ADR-0006 portability rule).
  # Covers the risk that Bun silently accepts non-Node APIs we'd regret in prod.
  test-on-node:
    name: Unit tests (Vitest on Node — portability parity)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Node 22.x is current LTS; vitest 2.1.8 supports ≥18.
      # Pin to active LTS for stable CI.
      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
      - run: bun install --frozen-lockfile
      # Invoke turbo via `npx` (Node) instead of `bun run`. Turbo spawns each
      # package's `vitest --run`; vitest's shebang (`#!/usr/bin/env node`)
      # resolves to the setup-node Node, giving us real Node-runtime parity.
      - name: Run Vitest under Node
        run: npx -y turbo@2.3.3 run test --filter=@dorm/shared

  build:
    name: Build
    needs: [lint, typecheck, test, bun-api-guard]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run build
